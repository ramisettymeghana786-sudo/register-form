<!DOCTYPE html>
<html>
<head><script type="text/javascript" src="/___vscode_livepreview_injected_script"></script>
    <title>Student Registration Form</title>
</head>
<body>

    <h1>Student Registration Form</h1>

    <form>
        <label>Full Name:</label><br>
        <input type="text" name="fullname"><br><br>

        <label>Password:</label><br>
        <input type="password" name="password"><br><br>

        <label>Email:</label><br>
        <input type="email" name="email"><br><br>

        <label>Age:</label><br>
        <input type="number" name="age"><br><br>

        <label>Phone:</label><br>
        <input type="tel" name="phone"><br><br>

        <label>Date of Birth:</label><br>
        <input type="date" name="dob"><br><br>

        <label>Preferred Time:</label><br>
        <input type="time" name="time"><br><br>

        <label>Favorite Color:</label><br>
        <input type="color" name="color"><br><br>

        <label>Skill Level:</label><br>
        <input type="range" min="1" max="10"><br><br>

        <label>Portfolio URL:</label><br>
        <input type="url" name="portfolio"><br><br>

        <label>Gender:</label><br>
        <input type="radio" name="gender" value="Male"> Male
        <input type="radio" name="gender" value="Female"> Female
        <input type="radio" name="gender" value="Other"> Other
        <br><br>

        <label>Skills:</label><br>
        <input type="checkbox" value="Python"> Python
        <input type="checkbox" value="Java"> Java
        <input type="checkbox" value="HTML"> HTML
        <br><br>

        <label>Upload Resume:</label><br>
        <input type="file" name="resume"><br><br>

        <input type="submit" value="Register">
    </form>

</body>
</html>
